name: Publish to PyPI

# Publishes on a GitHub Release (or a v* tag). Uses PyPI Trusted Publishing
# (OIDC) — no API token stored anywhere. Before the first run, configure a
# Trusted Publisher on PyPI: https://pypi.org/manage/account/publishing/
#   PyPI project: aact-kit
#   Owner: mahmood726-cyber   Repo: aact-kit
#   Workflow: publish.yml     Environment: pypi

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
